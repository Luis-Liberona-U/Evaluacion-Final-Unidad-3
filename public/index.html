<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Consolas</title>
</head>
<body>
    <div class="fomulario">
        <h1>Reporte de Consolas</h1>

        <form id="formularioReporte" novalidate>
            <label for="cliente">Nombre del Cliente:</label>
            <input type="text" id="cliente" placeholder="Ej: Carlos Palacios">
            <span id="errorCliente" class="error-text"></span>

            <label for="consola">Modelo de Consola:</label>
            <input type="text" id="consola" placeholder="Ej: PlayStation 2, Super Nintendo">
            <span id="errorConsola" class="error-text"></span>

            <label for="anio">Año de Lanzamiento:</label>
            <input type="number" id="anio" placeholder="Ej: 2000, 1990, 2013">
            <span id="errorAnio" class="error-text"></span>

            <label for="falla">Falla o Problema Detectado:</label>
            <textarea id="falla" placeholder="Ej: Pantalla negra, Lector malo, etc..."></textarea>
            <span id="errorFalla" class="error-text"></span>










        </form>














    </div>

    
</body>
</html>
